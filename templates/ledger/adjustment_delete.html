{% extends "base.html" %}
{% block title %}Удалить корректировку{% endblock %}
{% block heading %}Удалить корректировку?{% endblock %}
{% block content %}
<div class="panel" style="max-width:480px;">
    <p style="color:var(--txt-2);">{{ adjustment.get_type_display }} — <b class="num">{{ adjustment.display_amount }} {{ adjustment.currency }}</b></p>
    <form method="post" style="display:flex;gap:9px;margin-top:14px;">{% csrf_token %}
        <button type="submit" class="btn-ghost danger">Удалить</button>
        <a href="{% url 'ledger:adjustment_list' %}" class="btn-ghost">Отмена</a>
    </form>
</div>
{% endblock %}
